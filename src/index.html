    <script>
        const simFrame = document.getElementById('sim-frame');
        const loadingOverlay = document.getElementById('loading-overlay');
        const navItems = document.querySelectorAll('.nav-item');

        function switchModule(index, btnElement) {
            // 更新导航栏状态
            navItems.forEach(item => item.classList.remove('active'));
            btnElement.classList.add('active');

            // 显示加载遮罩
            loadingOverlay.style.opacity = '1';
            
            // 使用标准的 HTML5 template 标签提取内容，避免正则和反斜杠转义引发语法错误
            const template = document.getElementById(`tpl-${index}`);
            const rawHtml = template.innerHTML;

            // 延迟注入 Iframe，给 UI 渲染和过渡动画时间
            setTimeout(() => {
                // 利用 srcdoc 建立沙箱，百分之百隔离彼此的样式与 JS 环境
                simFrame.srcdoc = rawHtml;
                
                // 等待 Iframe 加载完成后隐藏遮罩
                simFrame.onload = () => {
                    setTimeout(() => {
                        loadingOverlay.style.opacity = '0';
                    }, 200);
                };
            }, 300);
        }

        // 初始化：默认加载第一个实验
        window.addEventListener('DOMContentLoaded', () => {
            switchModule(1, navItems[0]);
        });
    </script>
